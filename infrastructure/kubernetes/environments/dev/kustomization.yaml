apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-system

resources:
- ../../base

# Development-specific patches
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: query-service
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: retrieval-service
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: generation-service
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: frontend-service
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: neo4j-database
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: neo4j-service

# Common labels for dev environment  
labels:
- includeSelectors: true
  pairs:
    environment: dev
  
# Image tag for development
images:
- name: query-service
  newTag: dev
- name: retrieval-service
  newTag: dev
- name: generation-service
  newTag: dev
- name: frontend-service
  newTag: dev
- name: neo4j-service
  newTag: dev