apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-service
  labels:
    app: retrieval-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retrieval-service
  template:
    metadata:
      labels:
        app: retrieval-service
        tier: backend
    spec:
      containers:
      - name: retrieval-service
        image: retrieval-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: NEO4J_URI
          value: "bolt://neo4j-database:7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "password"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "800m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval-service
  labels:
    app: retrieval-service
spec:
  selector:
    app: retrieval-service
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
  type: ClusterIP