apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-database
  labels:
    app: neo4j-database
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-database
  template:
    metadata:
      labels:
        app: neo4j-database
        tier: database
    spec:
      containers:
      - name: neo4j
        image: neo4j:latest
        ports:
        - containerPort: 7474
        - containerPort: 7687
        env:
        - name: NEO4J_AUTH
          value: neo4j/password
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        - name: NEO4J_PLUGINS
          value: '["graph-data-science"]'
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
      volumes:
      - name: neo4j-data
        persistentVolumeClaim:
          claimName: neo4j-data-pvc