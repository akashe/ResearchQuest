apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: rag-system
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
      - name: airflow-webserver
        image: apache/airflow:2.8.0-python3.11
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "LocalExecutor"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "sqlite:////tmp/airflow.db"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
          value: "false"
        - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
          value: "true"
        - name: _AIRFLOW_DB_UPGRADE
          value: "true"
        - name: _AIRFLOW_WWW_USER_CREATE
          value: "true"
        - name: _AIRFLOW_WWW_USER_USERNAME
          value: "admin"
        - name: _AIRFLOW_WWW_USER_PASSWORD
          value: "admin123"
        command: ["/bin/bash", "-c"]
        args:
        - |
          airflow db init
          airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@example.com || true
          airflow webserver
        volumeMounts:
        - name: airflow-dags
          mountPath: /opt/airflow/dags
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: airflow-dags
        configMap:
          name: airflow-dags
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: rag-system
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
      - name: airflow-scheduler
        image: apache/airflow:2.8.0-python3.11
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "LocalExecutor"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "sqlite:////tmp/airflow.db"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        command: ["/bin/bash", "-c"]
        args:
        - |
          sleep 60  # Wait for webserver to initialize DB
          airflow scheduler
        volumeMounts:
        - name: airflow-dags
          mountPath: /opt/airflow/dags
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: airflow-dags
        configMap:
          name: airflow-dags
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: rag-system
  labels:
    app: airflow-webserver
spec:
  selector:
    app: airflow-webserver
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
  namespace: rag-system
data:
  arxiv_daily_pipeline.py: |
    from datetime import datetime, timedelta
    from airflow import DAG
    from airflow.operators.http_operator import SimpleHttpOperator
    from airflow.operators.python_operator import PythonOperator
    from airflow.operators.bash_operator import BashOperator
    import requests
    import json

    default_args = {
        'owner': 'graphrag-team',
        'depends_on_past': False,
        'start_date': datetime(2024, 1, 1),
        'email_on_failure': False,
        'email_on_retry': False,
        'retries': 1,
        'retry_delay': timedelta(minutes=5),
    }

    dag = DAG(
        'arxiv_daily_ingestion',
        default_args=default_args,
        description='Daily arXiv data ingestion pipeline',
        schedule_interval=timedelta(days=1),
        catchup=False,
        max_active_runs=1,
    )

    def check_arxiv_service_health():
        """Check if arXiv ingestion service is healthy"""
        try:
            response = requests.get('http://arxiv-ingestion-service:8004/health', timeout=10)
            if response.status_code == 200:
                return "healthy"
            else:
                raise Exception(f"Service unhealthy: {response.status_code}")
        except Exception as e:
            raise Exception(f"Health check failed: {str(e)}")

    def trigger_arxiv_ingestion():
        """Trigger arXiv data ingestion"""
        try:
            payload = {
                "force_download": False,
                "filter_years": 5
            }
            response = requests.post(
                'http://arxiv-ingestion-service:8004/ingest',
                json=payload,
                timeout=300
            )
            if response.status_code == 200:
                return response.json()
            else:
                raise Exception(f"Ingestion failed: {response.status_code}")
        except Exception as e:
            raise Exception(f"Ingestion trigger failed: {str(e)}")

    def check_ingestion_status():
        """Check ingestion completion status"""
        try:
            response = requests.get('http://arxiv-ingestion-service:8004/status', timeout=10)
            if response.status_code == 200:
                status = response.json()
                if status['status'] == 'completed':
                    return f"Ingestion completed: {status['new_papers']} new papers"
                elif status['status'] == 'failed':
                    raise Exception(f"Ingestion failed: {status['message']}")
                else:
                    raise Exception(f"Ingestion still in progress: {status['status']}")
        except Exception as e:
            raise Exception(f"Status check failed: {str(e)}")

    def publish_new_papers_to_kafka():
        """Get new papers and publish to Kafka"""
        try:
            # Get ALL new papers from arxiv service (now with ML filtering, no limit for full fidelity)
            response = requests.get('http://arxiv-ingestion-service:8004/data/new-papers')
            if response.status_code == 200:
                papers_data = response.json()
                papers = papers_data.get('papers', [])
                
                if papers:
                    # Transform to Kafka event format
                    kafka_events = []
                    for paper in papers:
                        kafka_events.append({
                            'id': paper['id'],
                            'title': paper['title'],
                            'authors': paper.get('authors', []),
                            'categories': paper.get('categories', ''),
                            'abstract': paper.get('abstract', ''),
                            'update_date': paper['update_date'],
                            'event_type': 'new_paper'
                        })
                    
                    # Publish to merged data pipeline graph builder service
                    response = requests.post(
                        'http://data-pipeline-graph-builder-service:8005/events/new-papers',
                        json=kafka_events,
                        timeout=1800  # 30 minutes for Semantic Scholar processing
                    )
                    
                    if response.status_code == 200:
                        return f"Published {len(kafka_events)} papers to data pipeline"
                    else:
                        raise Exception(f"Data pipeline publish failed: {response.status_code}")
                else:
                    return "No new papers to publish"
            else:
                raise Exception(f"Failed to get papers: {response.status_code}")
        except Exception as e:
            raise Exception(f"Pipeline publishing failed: {str(e)}")

    def wait_for_pipeline_completion():
        """Wait for data pipeline to complete processing"""
        import time
        max_wait = 3600  # 1 hour max wait
        wait_interval = 60  # Check every minute
        elapsed = 0
        
        while elapsed < max_wait:
            try:
                response = requests.get('http://data-pipeline-graph-builder-service:8005/status', timeout=10)
                if response.status_code == 200:
                    status = response.json()
                    if status.get('status') == 'idle':  # Pipeline completed
                        return f"Pipeline completed processing"
                    elif status.get('status') == 'error':
                        raise Exception(f"Pipeline error: {status.get('message', 'Unknown error')}")
                
                time.sleep(wait_interval)
                elapsed += wait_interval
                
            except Exception as e:
                print(f"Error checking pipeline status: {e}")
                time.sleep(wait_interval)
                elapsed += wait_interval
        
        raise Exception("Pipeline processing timed out")

    def trigger_step1_process_papers():
        """Trigger step 1: Process papers through semantic enrichment"""
        try:
            response = requests.post(
                'http://data-pipeline-graph-builder-service:8005/airflow/step1-process-papers',
                json={'timeout_minutes': 60},
                timeout=3600  # 1 hour timeout
            )
            
            if response.status_code == 200:
                return "Step 1 - Process papers triggered successfully"
            else:
                raise Exception(f"Step 1 trigger failed: {response.status_code} - {response.text}")
                
        except Exception as e:
            raise Exception(f"Step 1 trigger failed: {str(e)}")

    def trigger_step2_prune_data():
        """Trigger step 2: Prune and prepare data for graph building"""
        try:
            response = requests.post(
                'http://data-pipeline-graph-builder-service:8005/airflow/step2-prune-data',
                json={'timeout_minutes': 30},
                timeout=1800  # 30 minutes timeout
            )
            
            if response.status_code == 200:
                return "Step 2 - Prune data triggered successfully"
            else:
                raise Exception(f"Step 2 trigger failed: {response.status_code} - {response.text}")
                
        except Exception as e:
            raise Exception(f"Step 2 trigger failed: {str(e)}")

    def trigger_step3_build_graph():
        """Trigger step 3: Build graph using C++ and load into Neo4j"""
        try:
            response = requests.post(
                'http://data-pipeline-graph-builder-service:8005/airflow/step3-build-graph',
                json={'timeout_minutes': 120},
                timeout=7200  # 2 hours timeout
            )
            
            if response.status_code == 200:
                return "Step 3 - Build graph triggered successfully"
            else:
                raise Exception(f"Step 3 trigger failed: {response.status_code} - {response.text}")
                
        except Exception as e:
            raise Exception(f"Step 3 trigger failed: {str(e)}")

    def check_processing_completion():
        """Check if all processing steps completed successfully"""
        import time
        max_wait = 7200  # 2 hours max wait
        wait_interval = 120  # Check every 2 minutes
        elapsed = 0
        
        while elapsed < max_wait:
            try:
                response = requests.get('http://data-pipeline-graph-builder-service:8005/status', timeout=10)
                if response.status_code == 200:
                    status = response.json()
                    processing_status = status.get('status')
                    
                    if processing_status == 'completed':
                        return f"All processing completed: {status.get('message', 'Success')}"
                    elif processing_status == 'failed':
                        raise Exception(f"Processing failed: {status.get('message', 'Unknown error')}")
                    elif processing_status in ['idle', 'processing', 'running']:
                        print(f"Processing status: {processing_status} - {status.get('message', '')}")
                
                time.sleep(wait_interval)
                elapsed += wait_interval
                
            except Exception as e:
                print(f"Error checking processing status: {e}")
                time.sleep(wait_interval)
                elapsed += wait_interval
        
        raise Exception("Processing timed out")

    # Define tasks
    health_check = PythonOperator(
        task_id='check_service_health',
        python_callable=check_arxiv_service_health,
        dag=dag,
    )

    start_ingestion = PythonOperator(
        task_id='trigger_ingestion',
        python_callable=trigger_arxiv_ingestion,
        dag=dag,
    )

    wait_for_completion = BashOperator(
        task_id='wait_for_ingestion',
        bash_command='sleep 300',  # Wait 5 minutes for ingestion
        dag=dag,
    )

    check_completion = PythonOperator(
        task_id='check_ingestion_status',
        python_callable=check_ingestion_status,
        dag=dag,
    )

    publish_to_pipeline = PythonOperator(
        task_id='publish_papers_to_pipeline',
        python_callable=publish_new_papers_to_kafka,
        dag=dag,
    )

    wait_pipeline = PythonOperator(
        task_id='wait_for_pipeline_completion',
        python_callable=wait_for_pipeline_completion,
        dag=dag,
    )

    step1_process = PythonOperator(
        task_id='step1_process_papers',
        python_callable=trigger_step1_process_papers,
        dag=dag,
    )

    step2_prune = PythonOperator(
        task_id='step2_prune_data',
        python_callable=trigger_step2_prune_data,
        dag=dag,
    )

    step3_build = PythonOperator(
        task_id='step3_build_graph',
        python_callable=trigger_step3_build_graph,
        dag=dag,
    )

    check_completion_final = PythonOperator(
        task_id='check_final_completion',
        python_callable=check_processing_completion,
        dag=dag,
    )

    # Define task dependencies - Complete pipeline flow with new merged service architecture
    health_check >> start_ingestion >> wait_for_completion >> check_completion >> publish_to_pipeline >> wait_pipeline >> step1_process >> step2_prune >> step3_build >> check_completion_final

  graph_maintenance_pipeline.py: |
