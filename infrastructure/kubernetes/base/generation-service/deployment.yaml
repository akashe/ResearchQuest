apiVersion: apps/v1
kind: Deployment
metadata:
  name: generation-service
  labels:
    app: generation-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: generation-service
  template:
    metadata:
      labels:
        app: generation-service
        tier: backend
    spec:
      containers:
      - name: generation-service
        image: generation-service:latest
        ports:
        - containerPort: 8002
        envFrom:
        - secretRef:
            name: genai-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: generation-service
  labels:
    app: generation-service
spec:
  selector:
    app: generation-service
  ports:
  - protocol: TCP
    port: 8002
    targetPort: 8002
  type: ClusterIP