apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  labels:
    app: query-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
        tier: backend
    spec:
      containers:
      - name: query-service
        image: query-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: RETRIEVAL_SERVICE_URL
          value: "http://retrieval-service:8001"
        - name: GENERATION_SERVICE_URL
          value: "http://generation-service:8002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  labels:
    app: query-service
spec:
  selector:
    app: query-service
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP