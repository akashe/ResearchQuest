apiVersion: apps/v1
kind: Deployment
metadata:
  name: arxiv-ingestion-service
  namespace: rag-system
  labels:
    app: arxiv-ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arxiv-ingestion-service
  template:
    metadata:
      labels:
        app: arxiv-ingestion-service
    spec:
      # Init container to fix shared-data permissions
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          # Create directory and set permissions for appuser (uid 1000)
          mkdir -p /shared-data
          chown -R 1000:1000 /shared-data
          chmod -R 755 /shared-data
        volumeMounts:
        - name: shared-data
          mountPath: /shared-data
        securityContext:
          runAsUser: 0  # Run as root to change permissions
      containers:
      - name: arxiv-ingestion-service
        image: arxiv-ingestion-service:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8004
        env:
        - name: KAGGLE_CONFIG_DIR
          value: "/home/appuser/.kaggle"
        volumeMounts:
        - name: kaggle-credentials
          mountPath: /home/appuser/.kaggle
          readOnly: true
        - name: shared-data
          mountPath: /shared-data
        - name: data-volume
          mountPath: /data
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "8Gi"  # Increased for large arXiv dataset processing
            cpu: "5000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 300
          periodSeconds: 600
          timeoutSeconds: 500
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 500
          periodSeconds: 600
          timeoutSeconds: 500
          failureThreshold: 5
      volumes:
      - name: kaggle-credentials
        secret:
          secretName: kaggle-credentials
          items:
          - key: kaggle.json
            path: kaggle.json
      - name: shared-data
        persistentVolumeClaim:
          claimName: shared-data-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: arxiv-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: arxiv-ingestion-service
  namespace: rag-system
  labels:
    app: arxiv-ingestion-service
spec:
  selector:
    app: arxiv-ingestion-service
  ports:
  - port: 8004
    targetPort: 8004
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arxiv-data-pvc
  namespace: rag-system
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi  # Large enough for arXiv metadata + processing