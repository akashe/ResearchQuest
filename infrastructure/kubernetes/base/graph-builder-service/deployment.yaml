apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-builder-service
  namespace: rag-system
  labels:
    app: graph-builder-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-builder-service
  template:
    metadata:
      labels:
        app: graph-builder-service
    spec:
      # Init container to fix shared-data permissions
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          # Ensure shared-data is writable for appuser (uid 1000)
          mkdir -p /shared-data
          chown -R 1000:1000 /shared-data
          chmod -R 755 /shared-data
        volumeMounts:
        - name: shared-data
          mountPath: /shared-data
        securityContext:
          runAsUser: 0
      containers:
      - name: graph-builder-service
        image: graph-builder-service:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8006
        env:
        - name: NEO4J_SERVICE_URL
          value: "http://neo4j-service:8003"
        volumeMounts:
        - name: shared-data
          mountPath: /shared-data
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: shared-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: graph-builder-service
  namespace: rag-system
  labels:
    app: graph-builder-service
spec:
  selector:
    app: graph-builder-service
  ports:
  - port: 8006
    targetPort: 8006
    name: http
  type: ClusterIP