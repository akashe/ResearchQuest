apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pipeline-service
  namespace: rag-system
  labels:
    app: data-pipeline-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-pipeline-service
  template:
    metadata:
      labels:
        app: data-pipeline-service
    spec:
      containers:
      - name: data-pipeline-service
        image: data-pipeline-service:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8005
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        volumeMounts:
        - name: data-pipeline-volume
          mountPath: /data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: data-pipeline-volume
        persistentVolumeClaim:
          claimName: data-pipeline-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: data-pipeline-service
  namespace: rag-system
  labels:
    app: data-pipeline-service
spec:
  selector:
    app: data-pipeline-service
  ports:
  - port: 8005
    targetPort: 8005
    name: http
  type: ClusterIP