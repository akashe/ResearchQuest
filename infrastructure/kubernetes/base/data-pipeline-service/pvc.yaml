apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pipeline-pvc
  namespace: rag-system
  labels:
    app: data-pipeline-service
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi  # For references_complete.jsonl (9.9GB) + working space
  storageClass: standard